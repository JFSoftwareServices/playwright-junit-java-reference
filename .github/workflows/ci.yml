name: Playwright Enterprise CI/CD Pipeline

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  ###########################################################
  # QA
  ###########################################################

  qa:

    name: QA Deployment & Tests

    runs-on: ubuntu-latest

    environment:
      name: QA

    steps:

      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Deploy Application to QA
        run: |
          echo "=============================================="
          echo "Deploying application to QA..."
          echo "Deployment completed."
          echo "=============================================="

      - name: Execute Playwright Tests
        run: docker compose up --exit-code-from playwright-tests
        env:
          TEST_ENV: qa

      - name: Install Allure CLI
        if: always()
        run: sudo npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results \
          -o allure-report \
          --clean

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-allure-results
          path: allure-results/

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-allure-report
          path: allure-report/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-results
          path: test-results/

  ###########################################################
  # STAGING
  ###########################################################

  staging:

    name: Staging Deployment & Tests

    needs: qa

    runs-on: ubuntu-latest

    environment:
      name: Staging

    steps:

      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Promote Build to Staging
        run: |
          echo "=============================================="
          echo "QA passed."
          echo "Promoting build to Staging..."
          echo "Deployment completed."
          echo "=============================================="

      - name: Execute Playwright Regression Tests
        run: docker compose up --exit-code-from playwright-tests
        env:
          TEST_ENV: staging

      - name: Install Allure CLI
        if: always()
        run: sudo npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results \
          -o allure-report \
          --clean

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-allure-results
          path: allure-results/

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-allure-report
          path: allure-report/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-test-results
          path: test-results/

  ###########################################################
  # PRODUCTION
  ###########################################################

  production:

    name: Production Deployment

    needs: staging

    runs-on: ubuntu-latest

    #
    # Configure this Environment in GitHub and add
    # yourself as a Required Reviewer.
    #
    environment:
      name: Production

    steps:

      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "=============================================="
          echo "Manual approval received."
          echo ""
          echo "Promoting build to Production..."
          echo ""
          echo "Deploying application..."
          echo ""
          echo "Deployment completed successfully."
          echo ""
          echo "No Playwright tests executed in Production."
          echo ""
          echo "Production monitoring enabled."
          echo "=============================================="